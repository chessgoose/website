// Scene setup
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.01, 100);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

// Point cloud
const geometry = new THREE.BufferGeometry();
const positions = new Float32Array(points.length * 3);
const colors = new Float32Array(points.length * 3);

for (let i = 0; i < points.length; i++) {
  positions[i * 3] = points[i].x;
  positions[i * 3 + 1] = points[i].y;
  positions[i * 3 + 2] = points[i].z;
}
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

function createCircleTexture() {
  const size = 64;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, size, size);
  ctx.beginPath();
  ctx.arc(size / 2, size / 2, size / 2 - 2, 0, Math.PI * 2);
  ctx.fillStyle = '#ffffff';
  ctx.fill();
  return new THREE.CanvasTexture(canvas);
}

const material = new THREE.PointsMaterial({
  size: 0.025,
  vertexColors: true,
  sizeAttenuation: true,
  transparent: true,
  opacity: 0.9,
  alphaTest: 0.2,
  map: createCircleTexture(),
});
const cloud = new THREE.Points(geometry, material);
camera.position.set(0.5, 0.0, 0.0);
cloud.rotation.y = 0.3;
cloud.rotation.x = 0.0;
scene.add(cloud);

// Raycaster for hover tooltip
const raycaster = new THREE.Raycaster();
raycaster.params.Points.threshold = 0.03;
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');

function hexToRGB(hex) {
  const r = parseInt(hex.slice(1, 3), 16) / 255;
  const g = parseInt(hex.slice(3, 5), 16) / 255;
  const b = parseInt(hex.slice(5, 7), 16) / 255;
  return [r, g, b];
}

for (let i = 0; i < points.length; i++) {
  const hex = colorMap[points[i].cell_type] || '#888888';
  const [r, g, b] = hexToRGB(hex);
  colors[i * 3] = r;
  colors[i * 3 + 1] = g;
  colors[i * 3 + 2] = b;
}
geometry.attributes.color.needsUpdate = true;

// Hover
renderer.domElement.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObject(cloud);
  if (intersects.length > 0) {
    const idx = intersects[0].index;
    const p = points[idx];
    tooltip.innerHTML = `<b>Cell type:</b> ${p.cell_type}<br><b>Tissue:</b> ${p.tissue}`;
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY + 14) + 'px';
  } else {
    tooltip.style.display = 'none';
  }
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
